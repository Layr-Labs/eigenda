name: docker-publish-internal
on:
  push:
    branches:
      - master
  pull_request:
  merge_group:
  workflow_dispatch:

env:
  # TODO: Push to AWS CR at a later stage
  REGISTRY: ghcr.io

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 #4.2.2
        with:
          fetch-depth: 0

      - name: Setup Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 #v3.8.0
        with:
          install: true
          driver-opts: >-
            image=moby/buildkit:v0.24.0

      # Login against a Docker registry except on PR
      # https://github.com/docker/login-action
      - name: Log into registry ${{ env.REGISTRY }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 #v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build And Push Images
      - name: Build all (except encoder-icicle)
        run: |
          BAKE_ARGS="--set '*.cache-from=type=gha' --set '*.cache-to=type=gha,mode=max'" \
          make docker-build-except-icicle

      - name: Push all images (except encoder-icicle)
        if: github.ref == 'refs/heads/master'
        run: |
          BUILD_TAG=master \
          BAKE_ARGS="--set '*.cache-from=type=gha' --set '*.cache-to=type=gha,mode=max'" \
          make docker-build-push-except-icicle

      - name: Build encoder-icicle
        run: |
          BAKE_ARGS="--set '*.cache-from=type=gha' --set '*.cache-to=type=gha,mode=max'" \
          make encoder-icicle-build

      - name: Push encoder-icicle
        if: github.ref == 'refs/heads/master'
        run: |
          BUILD_TAG=master \
          BAKE_ARGS="--set '*.cache-from=type=gha' --set '*.cache-to=type=gha,mode=max'" \
          make encoder-icicle-push

      - name: Send GitHub Action trigger data to Slack workflow
        if: ${{ failure() }}
        id: slack
        uses: slackapi/slack-github-action@e28cf165c92ffef168d23c5c9000cffc8a25e117 #1.24.0
        with:
          payload: |
            {
              "workflow": "${{ github.workflow }}",
              "action_name": "${{ github.action }}",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.triggering_actor }}",
              "event_name": "${{ github.event_name }}",
              "run_id": "https://github.com/Layr-Labs/eigenda/actions/runs/${{ github.run_id }}",
              "commit_sha": "https://github.com/Layr-Labs/eigenda/commit/${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
